<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug UID</title>
<style>
  body { font-family: monospace; background: #0D0D18; color: #F0EDE6; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; text-align: center; }
  h2  { color: #C9A84C; margin-bottom: 8px; }
  p   { color: #8A8799; font-size: 14px; margin-bottom: 24px; }
  .uid-box { background: #1E1E35; border: 2px solid #C9A84C; border-radius: 12px; padding: 20px 24px; font-size: 15px; letter-spacing: 1px; word-break: break-all; max-width: 400px; margin-bottom: 16px; cursor: pointer; }
  .hint { font-size: 12px; color: #5D9BE8; }
  .btn { background: #fff; color: #1a1a1a; border: none; border-radius: 100px; padding: 14px 28px; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .status { color: #8A8799; font-size: 13px; margin-top: 12px; }
</style>
</head>
<body>

<h2>Debug — Trova il tuo UID</h2>
<p>Accedi con Google per vedere il tuo UID esatto da copiare su Firestore.</p>

<div id="login-section">
  <button class="btn" onclick="login()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Accedi con Google
  </button>
</div>

<div id="uid-section" style="display:none">
  <p>Il tuo UID è (tocca per copiare):</p>
  <div class="uid-box" id="uid-display" onclick="copyUID()">…</div>
  <div class="hint">👆 Tocca per copiare — poi incollalo come ID documento in Firestore → admins</div>
  <div class="status" id="copy-status"></div>
  <br>
  <button class="btn" onclick="logout()" style="background:#1E1E35;color:#F0EDE6;border:1px solid rgba(255,255,255,.1)">Esci</button>
</div>

<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app  = initializeApp({
  apiKey:            "AIzaSyAFvDuG0glouoEhN1Hqrd68c6F30A11su4",
  authDomain:        "goro-paese-canoro-2026.firebaseapp.com",
  projectId:         "goro-paese-canoro-2026",
  storageBucket:     "goro-paese-canoro-2026.firebasestorage.app",
  messagingSenderId: "782054899768",
  appId:             "1:782054899768:web:84473d4d299c4f42fa26cd"
});
const auth = getAuth(app);

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('uid-section').style.display   = '';
    document.getElementById('uid-display').textContent     = user.uid;
  } else {
    document.getElementById('login-section').style.display = '';
    document.getElementById('uid-section').style.display   = 'none';
  }
});

window.login  = () => signInWithPopup(auth, new GoogleAuthProvider());
window.logout = () => signOut(auth);
window.copyUID = async () => {
  const uid = document.getElementById('uid-display').textContent;
  try {
    await navigator.clipboard.writeText(uid);
    document.getElementById('copy-status').textContent = '✓ Copiato!';
    setTimeout(() => document.getElementById('copy-status').textContent = '', 2000);
  } catch(e) {
    document.getElementById('copy-status').textContent = 'Copia manualmente il testo sopra';
  }
};
</script>
</body>
</html>
